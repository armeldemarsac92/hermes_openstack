# Reference fragment only.
# The Terraform-rendered manifest in generated/workloads.yaml is authoritative for live rollouts.
# Replace or remove cloud-specific values like storageClassName before using this fragment directly.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: hermes
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: CHANGE_ME_OR_REMOVE
  resources:
    requests:
      storage: 40Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma4
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemma4
  template:
    metadata:
      labels:
        app: gemma4
    spec:
      nodeSelector:
        hermes.openstack.org/gemma4: "true"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_KEEP_ALIVE
              value: 24h
          resources:
            requests:
              cpu: "2"
              memory: 20Gi
            limits:
              memory: 22Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
        - name: model-loader
          image: curlimages/curl:8.13.0
          command:
            - /bin/sh
            - -ec
            - |
              until curl -fsS http://127.0.0.1:11434/api/tags >/dev/null; do
                sleep 5
              done
              until curl -fsS http://127.0.0.1:11434/api/pull \
                -H 'Content-Type: application/json' \
                -d '{"model":"gemma4:26b","stream":false}' >/dev/null; do
                sleep 15
              done
              while true; do
                sleep 3600
              done
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: gemma4
  namespace: hermes
spec:
  selector:
    app: gemma4
  ports:
    - name: http
      port: 11434
      targetPort: 11434
